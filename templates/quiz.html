<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<h2>Answer the questions</h2>

<form action="/result" method="post">

{% for q in questions %}
    <p><b>{{ q.question }}</b></p>

    {% set idx = loop.index0 %}

    {% for opt in q.options %}
        <input type="radio" name="q{{ idx }}" value="{{ opt }}" required>
        {{ opt }}<br>
    {% endfor %}

    <br>
{% endfor %}

<button type="submit">Submit</button>

</form>

</body>
</html>
