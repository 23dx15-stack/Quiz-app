<!DOCTYPE html>
<html>
<body>

<form action="/result" method="post">

{% for q in questions %}
<p>{{ q.question }}</p>

{% set idx = loop.index0 %}

{% for opt in q.options %}
<input type="radio" name="q{{ idx }}" value="{{ opt }}" required> {{ opt }}<br>
{% endfor %}

{% endfor %}

<button>Submit</button>

</form>

</body>
</html>
