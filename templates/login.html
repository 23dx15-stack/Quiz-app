<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(to right, #667eea, #764ba2);
    font-family: Arial;
    text-align: center;
}
.box {
    background: white;
    padding: 30px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    background: #667eea;
    color: white;
    padding: 10px;
    border: none;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p>New user? <a href="/signup">Sign up</a></p>
</div>

</body>
</html>
