<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial;
}
.card {
    width: 320px;
    margin: 100px auto;
    padding: 30px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
}
button {
    background: #667eea;
    color: white;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<p><a href="/signup">Create Account</a></p>
</div>

</body>
</html>
