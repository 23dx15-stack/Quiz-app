<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.container {
    text-align: center;
    padding: 40px;
}

.welcome {
    font-size: 32px;
    margin-bottom: 10px;
}

.sub {
    font-size: 18px;
    opacity: 0.8;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
}

.card {
    width: 250px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

.btn {
    padding: 12px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    font-size: 16px;
    cursor: pointer;
}

.btn:hover {
    background: #00ccaa;
}

.logout {
    background: #ff4d4d;
}

.logout:hover {
    background: #cc0000;
}

.icon {
    font-size: 40px;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="navbar">
    <h2>☁️ Cloud Quiz</h2>
    <a href="/logout"><button class="btn logout">Logout</button></a>
</div>

<div class="container">

<div class="welcome">Welcome, {{ user }} 👋</div>
<div class="sub">Test your knowledge in Cloud Computing 🚀</div>

<div class="cards">

    <div class="card">
        <div class="icon">🧠</div>
        <h3>Start Quiz</h3>
        <p>Challenge yourself</p>
        <a href="/select"><button class="btn">Play Now</button></a>
    </div>

    <div class="card">
        <div class="icon">📊</div>
        <h3>Performance</h3>
        <p>Check your last score</p>
        <a href="/performance"><button class="btn">View</button></a>
    </div>

    <div class="card">
        <div class="icon">⚡</div>
        <h3>Quick Tips</h3>
        <p>Learn cloud concepts</p>
        <a href="/tips"><button class="btn">Explore</button></a>
    </div>

</div>

</div>

</body>
</html>
