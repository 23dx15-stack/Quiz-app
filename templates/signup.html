<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(to right, #ff7e5f, #feb47b);
    font-family: Arial;
    text-align: center;
}
.box {
    background: white;
    padding: 30px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    background: #ff7e5f;
    color: white;
    padding: 10px;
    border: none;
}
</style>
</head>
<body>

<div class="box">
<h2>Sign Up</h2>
<form method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Register</button>
</form>
</div>

</body>
</html>
