<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    text-align: center;
    font-family: Arial;
    color: white;
}

.card {
    margin: 100px auto;
    width: 350px;
    padding: 40px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 20px;
}

.score {
    font-size: 50px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h2>Your Score</h2>
<div class="score">{{ score }} / {{ total }}</div>

<a href="/"><button style="padding:10px;">Home</button></a>
</div>

</body>
</html>
